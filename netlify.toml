[build]
  publish = "public"
  command = "npm run build"

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Cache static assets (1 year) — filenames are content-hashed by eleventy-img
[[headers]]
  for = "/img/optimized/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache CSS/JS (1 week) — not content-hashed, so shorter TTL
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Cache static images (1 week)
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Frame-Options = "SAMEORIGIN"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self), payment=()"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Report-only CSP — switch to Content-Security-Policy once verified clean in browser console
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline' https://static.getclicky.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://www.nordichottubs.com https://maps.googleapis.com https://maps.gstatic.com https://in.getclicky.com; frame-src 'self' https://maps.google.com https://www.google.com https://www.youtube.com https://artesianspas.com https://tidalfit.com https://www.nordichottubs.com https://southseasspas.com https://thegardenspas.com https://covana.com; connect-src 'self' https://in.getclicky.com; object-src 'none'; base-uri 'self'"

